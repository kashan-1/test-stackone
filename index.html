<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevOps Tools</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #e0e7f1;
      margin: 0;
      padding: 20px;
      text-align: center;
      overflow-x: hidden;
    }

    h1 {
      font-size: 2.8rem;
      color: #1f2937;
      margin-bottom: 50px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
      animation: fadeIn 1s ease forwards;
      opacity: 0;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .card {
      border-radius: 20px;
      width: 200px;
      padding: 25px;
      text-align: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      color: #fff;
      transition: transform 0.5s ease, box-shadow 0.5s ease;
      animation: float 4s ease-in-out infinite, fadeIn 1s ease forwards;
      opacity: 0;
    }

    .card img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 15px;
      transition: transform 0.5s ease;
    }

    .card h2 {
      margin: 0;
      font-size: 1.3rem;
      transition: text-shadow 0.3s ease;
    }

    /* Tool-specific gradients */
    .jenkins { background: linear-gradient(135deg, #d24726, #ff7c4d); box-shadow: 0 0 15px rgba(210,71,38,0.6);}
    .vscode { background: linear-gradient(135deg, #f1dddd, #00cfff); box-shadow: 0 0 15px rgba(0,122,204,0.6);}
    .grafana { background: linear-gradient(135deg, #f16529, #f7941e); box-shadow: 0 0 15px rgba(241,101,41,0.6);}
    .prometheus { background: linear-gradient(135deg, #6a1b9a, #ec407a); box-shadow: 0 0 15px rgba(106,27,154,0.6);}
    .node-exporter { background: linear-gradient(135deg, #2e7d32, #66bb6a); box-shadow: 0 0 15px rgba(46,125,50,0.6);}



    .card:hover {
      transform: scale(1.12) rotate(-1deg);
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }

    .card:hover img {
      transform: rotate(15deg) scale(1.2);
    }

    .card a {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      text-indent: -9999px;
    }

    /* Floating animation */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Fade in animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    /* Stagger card animations */
    .container .card:nth-child(1) { animation-delay: 0.1s; }
    .container .card:nth-child(2) { animation-delay: 0.3s; }
    .container .card:nth-child(3) { animation-delay: 0.5s; }
    .container .card:nth-child(4) { animation-delay: 0.7s; }
    .container .card:nth-child(5) { animation-delay: 0.9s; }
  </style>
</head>
<body>
  <h1>DevOps StackOne 🚀</h1>
  <div class="container">
    <div class="card jenkins" onclick="window.open('https://jenkins.local','_blank')">
      <img src="https://upload.wikimedia.org/wikipedia/commons/e/e9/Jenkins_logo.svg" alt="Jenkins Logo">
      <h2>Jenkins</h2>
    </div>

    <div class="card vscode" onclick="window.open('https://code.local','_blank')">
      <img src="https://code.visualstudio.com/assets/branding/code-stable.png" alt="VS Code Logo">
      <h2>VS Code</h2>
    </div>

    <div class="card grafana" onclick="window.open('https://grafana.local','_blank')">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Grafana_icon.svg" alt="Grafana Logo">
      <h2>Grafana</h2>
    </div>

    <div class="card prometheus" onclick="window.open('https://prometheus.local','_blank')">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/38/Prometheus_software_logo.svg" alt="Prometheus Logo">
      <h2>Prometheus</h2>
    </div>

    <div class="card node-exporter" onclick="window.open('https://node-exporter.local','_blank')">
      <img src="https://artifacthub.io/image/5ee0219d-fc3b-43f4-b8ee-75b72f05f714@3x" alt="Node Exporter Logo">
      <h2>Node Exporter</h2>
    </div>
  </div>
</body>
</html>
